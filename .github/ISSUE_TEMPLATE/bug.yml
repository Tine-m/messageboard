name: Bug
description: Report a bug
title: "Bug: "
labels: ["bug"]

body:

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the bug?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /posts
        2. Click create post
        3. Submit form
        4. Error occurs

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen?